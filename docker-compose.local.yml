services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: purchase-organizer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: purchase_organizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Development container (with hot reload)
  app:
    image: node:24-alpine
    container_name: purchase-organizer-dev
    working_dir: /app
    command: sh /app/docker-entrypoint.dev.sh
    ports:
      - "3000:3000"
      - "5555:5555"  # Prisma Studio port
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/purchase_organizer?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      UPLOAD_DIR: public/uploads
      MAX_FILE_SIZE: 5242880
      ALLOWED_FILE_TYPES: image/jpeg,image/png,image/webp
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
